{% extends 'base.html' %}
{% block title %}Onboard New Agency | Vanguard Pro{% endblock %}

{% block content %}
<style>
    /* --- Apple Pro Form Architecture --- */
    .onboard-container {
        max-width: 900px;
        margin: 0 auto;
        animation: appleFadeUp 0.8s cubic-bezier(0.15, 1, 0.3, 1);
    }

    @keyframes appleFadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Sectional Cards */
    .form-section {
        background: white;
        border-radius: 24px;
        padding: 40px;
        margin-bottom: 30px;
        border: 1px solid rgba(0,0,0,0.03);
        box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .section-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 35px;
        padding-bottom: 20px;
        border-bottom: 1px solid #f5f5f7;
    }

    .section-header i {
        font-size: 1.2rem;
        color: var(--brand-midnight);
    }

    .section-header h2 {
        margin: 0;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: -0.02em;
    }

    /* Apple-Style Input Groups */
    .onboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .input-group { margin-bottom: 20px; }
    
    .input-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-muted);
        margin-bottom: 10px;
        padding-left: 4px;
    }

    .input-group input {
        width: 100%;
        padding: 16px 20px;
        border-radius: 14px;
        border: 1px solid #d2d2d7;
        background: #fff;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 500;
        color: var(--text-main);
        transition: all 0.2s ease;
    }

    .input-group input:focus {
        border-color: var(--brand-accent);
        background: #fff;
        outline: none;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }

    .input-group input[type="file"] {
        padding: 12px;
        background: #f5f5f7;
        border: 1.5px dashed #d2d2d7;
        font-size: 0.85rem;
    }

    /* Primary Action Button */
    .btn-initialize {
        background: var(--brand-midnight);
        color: white;
        border: none;
        padding: 22px;
        border-radius: 18px;
        font-weight: 700;
        font-size: 1.1rem;
        width: 100%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        margin-top: 10px;
    }

    .btn-initialize:hover {
        transform: scale(1.01);
        background: #1d1d1f;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .btn-initialize:active {
        transform: scale(0.98);
    }

    /* Responsive Logic */
    @media (max-width: 768px) {
        .onboard-grid { grid-template-columns: 1fr; }
        .form-section { padding: 25px; }
        .hero-title { font-size: 1.8rem; }
    }
</style>

<div class="onboard-container">
    <div style="margin-bottom: 50px;">
        <h1 style="font-size: 2.8rem; font-weight: 800; letter-spacing: -0.04em; color: var(--brand-midnight); margin: 0;">Network Expansion</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; font-weight: 500; margin-top: 10px;">Provision a new cryptographically isolated workspace for client agencies.</p>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-section">
            <div class="section-header">
                <i class="fas fa-building"></i>
                <h2>Enterprise Details</h2>
            </div>
            
            <div class="onboard-grid">
                <div class="input-group">
                    <label>Agency Registered Name</label>
                    <input type="text" name="company_name" required placeholder="e.g. Kakiwala Travels">
                </div>
                <div class="input-group">
                    <label>3-Letter Booking Prefix</label>
                    <input type="text" name="id_prefix" required maxlength="5" placeholder="e.g. KAK" style="text-transform: uppercase;">
                </div>
            </div>

            <div class="input-group" style="margin-top: 10px;">
                <label>Brand Logo Asset</label>
                <input type="file" name="logo" accept="image/*">
            </div>
        </div>

        <div class="form-section" style="background: #fafafa;">
            <div class="section-header">
                <i class="fas fa-key"></i>
                <h2>Root Administrator</h2>
            </div>

            <div class="onboard-grid">
                <div class="input-group">
                    <label>Manager Username</label>
                    <input type="text" name="manager_username" required placeholder="system.admin" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Contact Email</label>
                    <input type="email" name="manager_email" placeholder="admin@agency.com">
                </div>
            </div>

            <div class="input-group">
                <label>Security Key (Master Password)</label>
                <input type="password" name="manager_password" required placeholder="••••••••••••">
            </div>
        </div>

        <button type="submit" class="btn-initialize">
            <i class="fas fa-plus"></i> Initialize Workspace
        </button>
    </form>
</div>
{% endblock %}
